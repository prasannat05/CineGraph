<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineGraph | Knowledge Graph Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .dropdown-item:hover { background: #1e293b; cursor: pointer; color: #3b82f6; }
        .movie-card:hover { transform: scale(1.03); border-color: #3b82f6; }
        .graph-link-concept { stroke: rgba(59, 130, 246, 0.26); stroke-width: 2; }
        .graph-link-score { stroke: rgba(248, 250, 252, 0.28); stroke-width: 1.5; stroke-dasharray: 6 6; }
        .graph-label { fill: #e2e8f0; font-size: 12px; font-weight: 700; text-anchor: middle; }
        .graph-subtext { fill: #94a3b8; font-size: 10px; font-weight: 700; text-anchor: middle; letter-spacing: 1.5px; }
        .graph-backdrop { background: rgba(2, 6, 23, 0.78); backdrop-filter: blur(10px); }
        .graph-chip { border: 1px solid rgba(59,130,246,0.28); background: rgba(30,41,59,0.65); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto py-10">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-black tracking-tighter mb-4">CINE<span class="text-blue-500">GRAPH</span></h1>
            <p class="text-slate-500 uppercase tracking-widest text-sm font-bold">Movie Facts | Knowledge Graph | Transformers | Voice Search</p>
        </div>

        <div class="relative max-w-2xl mx-auto mb-20 z-50">
            <div class="glass p-2 rounded-2xl flex items-center shadow-2xl transition-all focus-within:ring-2 focus-within:ring-blue-500">
                <i class="fa-solid fa-magnifying-glass ml-5 text-slate-500"></i>
                <input id="movieIn" type="text" autocomplete="off"
                    placeholder="Search movie title (e.g. Avatar)..."
                    class="bg-transparent flex-1 px-5 py-4 outline-none text-xl text-white">
                <button id="micBtn" type="button" class="mx-2 text-slate-400 hover:text-blue-300 transition-colors text-xl" title="Voice Search">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <button onclick="startRecommendation()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-xl font-bold transition-all shadow-lg">
                    DISCOVER
                </button>
            </div>
            <div id="autocomplete" class="absolute w-full mt-2 glass rounded-xl overflow-hidden hidden shadow-2xl border border-slate-700"></div>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-blue-400 font-mono tracking-tighter">TRAVERSING KNOWLEDGE GRAPH + TRANSFORMER RERANKER...</p>
        </div>

        <div id="metaInfo" class="mb-10 text-center text-slate-400"></div>

        <div id="graphControls" class="hidden mb-10 text-center">
            <button id="graphBtn" type="button" class="glass px-6 py-3 rounded-2xl font-bold text-sm uppercase tracking-[0.25em] text-blue-300 hover:text-white hover:border-blue-400 transition-all">
                <i class="fa-solid fa-circle-nodes mr-2"></i>
                View Knowledge Graph
            </button>
        </div>

        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <div id="graphModal" class="hidden fixed inset-0 z-[100] graph-backdrop p-4">
        <div class="max-w-5xl mx-auto h-full flex items-center justify-center">
            <div class="glass w-full rounded-[2rem] border border-slate-700 shadow-2xl overflow-hidden">
                <div class="flex items-center justify-between px-6 py-5 border-b border-slate-800">
                    <div>
                        <p class="text-xs uppercase tracking-[0.3em] text-slate-500 font-bold">Graph Reasoning View</p>
                        <h2 class="text-2xl font-black text-white">Knowledge Graph</h2>
                    </div>
                    <button id="closeGraphBtn" type="button" class="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
                </div>
                <div class="p-6">
                    <p id="graphCaption" class="text-slate-400 mb-4 text-sm"></p>
                    <div class="rounded-[1.5rem] border border-slate-800 bg-slate-950/70 overflow-hidden">
                        <svg id="graphCanvas" viewBox="0 0 900 520" class="w-full h-[520px]"></svg>
                    </div>
                    <div id="graphLegend" class="mt-4 flex flex-wrap gap-3 text-[11px] uppercase tracking-[0.2em] text-slate-400"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OMDB_KEY = "e8b1f1e4";
        const input = document.getElementById('movieIn');
        const dropdown = document.getElementById('autocomplete');
        const meta = document.getElementById('metaInfo');
        const graphControls = document.getElementById('graphControls');
        const graphBtn = document.getElementById('graphBtn');
        const micBtn = document.getElementById('micBtn');
        const graphModal = document.getElementById('graphModal');
        const closeGraphBtn = document.getElementById('closeGraphBtn');
        const graphCanvas = document.getElementById('graphCanvas');
        const graphCaption = document.getElementById('graphCaption');
        const graphLegend = document.getElementById('graphLegend');
        const relationLabels = {
            genres: 'Genres',
            keywords: 'Keywords',
            entities: 'Entities',
            companies: 'Companies',
            countries: 'Countries',
            languages: 'Languages',
            decade: 'Decade',
            original_language: 'Original Language',
            runtime_band: 'Runtime',
            status: 'Status'
        };
        const typeConfig = {
            genres: { label: 'Genres', fill: '#0f766e' },
            keywords: { label: 'Keywords', fill: '#7c2d12' },
            entities: { label: 'Entities', fill: '#4c1d95' },
            companies: { label: 'Companies', fill: '#1d4ed8' },
            countries: { label: 'Countries', fill: '#166534' },
            languages: { label: 'Languages', fill: '#9a3412' },
            decade: { label: 'Decade', fill: '#475569' },
            original_language: { label: 'Orig Lang', fill: '#6d28d9' },
            status: { label: 'Status', fill: '#334155' },
            runtime_band: { label: 'Runtime', fill: '#854d0e' }
        };
        const typeOrder = ['genres', 'keywords', 'entities', 'companies', 'countries', 'languages', 'decade', 'original_language', 'runtime_band', 'status'];
        let latestGraphPayload = null;
        let speechRecognition = null;

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function wrapLabel(text, limit = 16) {
            const words = String(text).split(' ');
            const lines = [];
            let currentLine = '';

            for (const word of words) {
                const nextLine = currentLine ? `${currentLine} ${word}` : word;
                if (nextLine.length <= limit) {
                    currentLine = nextLine;
                } else {
                    if (currentLine) lines.push(currentLine);
                    currentLine = word;
                }
            }

            if (currentLine) lines.push(currentLine);
            return lines.slice(0, 3);
        }

        function renderKnowledgeGraph() {
            if (!latestGraphPayload?.graph) return;

            const width = 900;
            const height = 520;
            const graph = latestGraphPayload.graph;
            const sourceNode = graph.nodes.find(node => node.role === 'source');
            const movieNodes = graph.nodes
                .filter(node => node.type === 'movie' && node.role !== 'source')
                .sort((a, b) => (b.score ?? 0) - (a.score ?? 0));
            const conceptNodes = graph.nodes
                .filter(node => node.role === 'concept')
                .sort((a, b) => (b.score ?? 0) - (a.score ?? 0) || a.label.localeCompare(b.label));

            if (!sourceNode) return;

            const nodePositions = {};
            const sourceX = 150;
            const conceptColumns = [350, 530];
            const movieX = 750;
            const sourceY = height / 2;
            const movieGap = height / (movieNodes.length + 1 || 2);
            const conceptGroups = typeOrder
                .map(type => ({
                    type,
                    nodes: conceptNodes.filter(node => node.type === type)
                }))
                .filter(group => group.nodes.length)
                .slice(0, 10);

            nodePositions[sourceNode.id] = { ...sourceNode, x: sourceX, y: sourceY, r: 58 };

            conceptGroups.forEach((group, groupIndex) => {
                const column = groupIndex % 2;
                const row = Math.floor(groupIndex / 2);
                const baseX = conceptColumns[column];
                const baseY = 70 + (row * 95);

                group.nodes.slice(0, 3).forEach((node, nodeIndex) => {
                    nodePositions[node.id] = {
                        ...node,
                        x: baseX,
                        y: baseY + 24 + (nodeIndex * 23),
                        r: 15
                    };
                });
            });

            movieNodes.forEach((node, index) => {
                nodePositions[node.id] = {
                    ...node,
                    x: movieX,
                    y: movieGap * (index + 1),
                    r: 38
                };
            });

            const linksMarkup = graph.edges.map(edge => {
                const source = nodePositions[edge.source];
                const target = nodePositions[edge.target];
                if (!source || !target) return '';
                const edgeClass = edge.type === 'hybrid-score' ? 'graph-link-score' : 'graph-link-concept';
                const labelX = (source.x + target.x) / 2;
                const labelY = (source.y + target.y) / 2;
                const showLabel = edge.type === 'hybrid-score';
                return `
                    <g>
                        <line class="${edgeClass}" x1="${source.x}" y1="${source.y}" x2="${target.x}" y2="${target.y}"></line>
                        ${showLabel ? `<text x="${labelX}" y="${labelY - 6}" fill="#cbd5e1" font-size="10" text-anchor="middle">${escapeHtml(edge.label)}</text>` : ''}
                    </g>
                `;
            }).join('');

            const nodeMarkup = Object.values(nodePositions).map(node => {
                const isSource = node.role === 'source';
                const fill = isSource ? '#1e3a8a' : node.type === 'movie' ? '#0f172a' : (typeConfig[node.type]?.fill || '#334155');
                const stroke = isSource ? '#93c5fd' : '#cbd5e1';
                const labelLimit = node.type === 'movie' ? 15 : 16;
                const subtext = isSource
                    ? 'SOURCE'
                    : node.type === 'movie'
                        ? `HYBRID ${Number(node.score || 0).toFixed(3)}`
                        : (typeConfig[node.type]?.label || String(node.type).toUpperCase());

                return `
                    <g>
                        <circle cx="${node.x}" cy="${node.y}" r="${node.r}" fill="${fill}" stroke="${stroke}" stroke-width="${isSource ? 3 : 1.6}"></circle>
                        <text class="graph-label" x="${node.x}" y="${node.y - 6}">
                            ${wrapLabel(node.label, labelLimit).map((line, idx) => `<tspan x="${node.x}" dy="${idx === 0 ? 0 : 14}">${escapeHtml(line)}</tspan>`).join('')}
                        </text>
                        <text class="graph-subtext" x="${node.x}" y="${node.y + Math.min(node.r, 32)}">${escapeHtml(subtext)}</text>
                    </g>
                `;
            }).join('');

            const profile = graph.knowledge_profile || {};
            const factCount = Object.values(profile).reduce((sum, items) => sum + (items?.length || 0), 0);

            graphCanvas.innerHTML = `
                <defs>
                    <radialGradient id="graphGlow" cx="50%" cy="50%" r="60%">
                        <stop offset="0%" stop-color="rgba(59,130,246,0.18)"></stop>
                        <stop offset="100%" stop-color="rgba(15,23,42,0)"></stop>
                    </radialGradient>
                </defs>
                <rect x="0" y="0" width="${width}" height="${height}" fill="url(#graphGlow)"></rect>
                <text x="${sourceX}" y="28" class="graph-subtext">SEARCHED MOVIE</text>
                <text x="440" y="28" class="graph-subtext">SHARED GRAPH FACTS</text>
                <text x="${movieX}" y="28" class="graph-subtext">RECOMMENDATIONS</text>
                ${conceptGroups.map((group, groupIndex) => {
                    const column = groupIndex % 2;
                    const row = Math.floor(groupIndex / 2);
                    const x = conceptColumns[column];
                    const y = 70 + (row * 95);
                    return `<text x="${x}" y="${y}" class="graph-subtext">${escapeHtml(typeConfig[group.type]?.label || group.type)}</text>`;
                }).join('')}
                ${linksMarkup}
                ${nodeMarkup}
            `;

            const scoring = graph.scoring || {};
            graphCaption.innerHTML = `Hybrid recommendation view for <span class="text-blue-300 font-bold">"${escapeHtml(latestGraphPayload.searched_for)}"</span>. The system first scores shared graph facts, then adds a transformer semantic reranking bonus${scoring.transformer_enabled ? '' : ' when the transformer model is available'}.`;
            graphLegend.innerHTML = `
                <span class="graph-chip px-3 py-2 rounded-full">Source movie</span>
                <span class="graph-chip px-3 py-2 rounded-full">Recommended movies with hybrid score</span>
                <span class="graph-chip px-3 py-2 rounded-full text-teal-300">Genres</span>
                <span class="graph-chip px-3 py-2 rounded-full text-orange-300">Keywords</span>
                <span class="graph-chip px-3 py-2 rounded-full text-violet-300">Entities</span>
                <span class="graph-chip px-3 py-2 rounded-full text-slate-300">Source facts: ${factCount}</span>
                <span class="graph-chip px-3 py-2 rounded-full text-slate-300">Mode: ${scoring.method || 'Graph traversal'}</span>
            `;
        }

        function setupVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                micBtn.classList.add('hidden');
                return;
            }

            speechRecognition = new SpeechRecognition();
            speechRecognition.lang = 'en-US';
            speechRecognition.interimResults = false;
            speechRecognition.maxAlternatives = 1;

            speechRecognition.addEventListener('start', () => {
                micBtn.classList.remove('text-slate-400');
                micBtn.classList.add('text-red-400');
            });

            speechRecognition.addEventListener('end', () => {
                micBtn.classList.remove('text-red-400');
                micBtn.classList.add('text-slate-400');
            });

            speechRecognition.addEventListener('result', (event) => {
                const transcript = event.results[0][0].transcript;
                input.value = transcript;
                startRecommendation();
            });

            speechRecognition.addEventListener('error', () => {
                meta.innerHTML = '<span class="text-yellow-400 font-bold">Voice recognition failed. Please try again or type your search.</span>';
            });
        }

        input.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            try {
                const res = await fetch(`http://127.0.0.1:8000/search?query=${encodeURIComponent(query)}`);
                const titles = await res.json();
                if (titles.length) {
                    dropdown.innerHTML = titles.map(t => `<div class="dropdown-item p-4 border-b border-slate-800/30 font-medium">${escapeHtml(t)}</div>`).join('');
                    dropdown.classList.remove('hidden');
                } else {
                    dropdown.classList.add('hidden');
                }
            } catch (err) {
                console.error('Search failed');
            }
        });

        dropdown.addEventListener('click', (e) => {
            if (e.target.classList.contains('dropdown-item')) {
                input.value = e.target.innerText;
                dropdown.classList.add('hidden');
                startRecommendation();
            }
        });

        async function startRecommendation() {
            const val = input.value;
            const resDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!val) return;
            resDiv.innerHTML = '';
            dropdown.classList.add('hidden');
            loader.classList.remove('hidden');
            meta.innerHTML = '';
            graphControls.classList.add('hidden');
            latestGraphPayload = null;

            try {
                const response = await fetch(`http://127.0.0.1:8000/recommend?title=${encodeURIComponent(val)}`);
                const result = await response.json();
                loader.classList.add('hidden');

                if (result.error) {
                    meta.innerHTML = `<span class="text-red-500 font-bold">${escapeHtml(result.error)}</span>`;
                    return;
                }

                meta.innerHTML = `Showing graph + transformer recommendations for: <span class="text-blue-400 font-black">"${escapeHtml(result.searched_for)}"</span>`;
                latestGraphPayload = result;
                graphControls.classList.remove('hidden');

                for (const movie of result.data) {
                    const omdb = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(movie.title)}&apikey=${OMDB_KEY}`).then(r => r.json());
                    const poster = omdb.Poster && omdb.Poster !== 'N/A' ? omdb.Poster : 'https://via.placeholder.com/400x600?text=Poster+Not+Found';

                    resDiv.innerHTML += `
                        <div class="glass rounded-3xl overflow-hidden movie-card transition-all duration-300 border border-slate-800 flex flex-col">
                            <img src="${poster}" class="w-full h-80 object-cover opacity-90">
                            <div class="p-6 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-3 gap-4">
                                    <h3 class="font-bold text-xl text-white leading-tight">${escapeHtml(movie.title)}</h3>
                                    <span class="text-yellow-500 font-bold flex items-center gap-1 whitespace-nowrap">
                                        <i class="fa-solid fa-star text-[10px]"></i> ${Number(movie.rating).toFixed(1)}
                                    </span>
                                </div>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${(movie.genre_list || []).slice(0, 3).map(g => `<span class="bg-blue-500/10 text-blue-400 text-[10px] px-2 py-1 rounded font-black uppercase tracking-tighter border border-blue-500/20">${escapeHtml(g)}</span>`).join('')}
                                </div>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${(movie.matched_facts || []).slice(0, 4).map(fact => `<span class="bg-slate-800 text-slate-200 text-[10px] px-2 py-1 rounded-full border border-slate-700">${escapeHtml(fact.label)}: ${escapeHtml(fact.value)}</span>`).join('')}
                                </div>
                                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-3">
                                    ${Object.entries(movie.score_breakdown || {}).slice(0, 3).map(([kind, value]) => `${relationLabels[kind] || kind}: ${Number(value).toFixed(2)}`).join(' | ')}
                                </p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-3">
                                    GRAPH: ${Number(movie.graph_score || 0).toFixed(3)} | TRANSFORMER: ${Number(movie.transformer_score || 0).toFixed(3)}
                                </p>
                                <p class="text-slate-400 text-xs line-clamp-3 mb-6 leading-relaxed italic">${escapeHtml(movie.overview)}</p>
                                <div class="mt-auto pt-4 border-t border-slate-800 flex justify-between items-center">
                                    <span class="text-[9px] text-slate-600 font-mono">HYBRID_${Number(movie.score || 0).toFixed(3)}</span>
                                    <i class="fa-solid fa-circle-nodes text-blue-400 text-sm"></i>
                                </div>
                            </div>
                        </div>`;
                }
            } catch (e) {
                loader.classList.add('hidden');
                meta.innerHTML = 'Backend connection error. Please run app.py.';
            }
        }

        graphBtn.addEventListener('click', () => {
            if (!latestGraphPayload) return;
            renderKnowledgeGraph();
            graphModal.classList.remove('hidden');
        });

        micBtn.addEventListener('click', () => {
            if (!speechRecognition) return;
            speechRecognition.start();
        });

        closeGraphBtn.addEventListener('click', () => {
            graphModal.classList.add('hidden');
        });

        graphModal.addEventListener('click', (e) => {
            if (e.target === graphModal) {
                graphModal.classList.add('hidden');
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                dropdown.classList.add('hidden');
                startRecommendation();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                graphModal.classList.add('hidden');
            }
        });

        setupVoiceRecognition();
    </script>
</body>
</html>
